name: SVV Verification Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:

  z-model-check:
    name: Z Model Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Z Model Files
        run: |
          echo "Checking Z-Model files..."

          if ls z-model/*.zed 1> /dev/null 2>&1; then
            echo "Z model files found"
          else
            echo "No .zed files found in z-model folder"
            exit 1
          fi

  vdm-check:
    name: VDM Specification Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify VDM Files
        run: |
          echo "Checking VDM specification..."

          if ls vdm-specification/*.vdmpp 1> /dev/null 2>&1; then
            echo "VDM++ file found"
          else
            echo "No .vdmpp files found"
            exit 1
          fi

  alloy-check:
    name: Alloy Model Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Alloy Files
        run: |
          echo "Checking Alloy model..."

          if ls Alloy/*.als 1> /dev/null 2>&1; then
            echo "Alloy specification found"
          else
            echo "No .als file found"
            exit 1
          fi

  validation-check:
    name: Validation Report Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Validation Report
        run: |
          echo "Checking validation reports..."

          if ls validation/*.md 1> /dev/null 2>&1; then
            echo "Validation report found"
          else
            echo "Validation report missing"
            exit 1
          fi

  ci-pipeline-check:
    name: CI Pipeline Documentation Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify CI Pipeline Docs
        run: |
          echo "Checking CI pipeline documentation..."

          if ls ci-pipline/*.md 1> /dev/null 2>&1; then
            echo "CI pipeline documentation found"
          else
            echo "CI pipeline documentation missing"
            exit 1
          fi
